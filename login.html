<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NK Digital Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; }
        .login-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-white mb-2">MRTECHNICIAN</h1>
            <p class="text-gray-500">Login to NK Digital Services to enter the draw</p>
        </div>

        <div class="login-card p-8 rounded-[32px] shadow-2xl">
            <form action="#" onsubmit="return handleLogin(event)">
                <div class="mb-6">
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2 ml-1">Email Address</label>
                    <input type="email" required placeholder="name@company.com" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-orange-500 transition">
                </div>
                
                <div class="mb-8">
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2 ml-1">Access Code / Password</label>
                    <input type="password" required placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-orange-500 transition">
                </div>

                <button type="submit" class="w-full bg-orange-500 text-white font-black py-4 rounded-xl shadow-[0_10px_30px_rgba(248,86,6,0.3)] hover:scale-[1.02] transition-transform">
                    START WINNING
                </button>
            </form>

            <div class="mt-8 flex items-center gap-4">
                <hr class="flex-1 border-white/10">
                <span class="text-xs text-gray-500">OR JOIN WITH</span>
                <hr class="flex-1 border-white/10">
            </div>

            <div class="mt-6 flex gap-4">
                <button class="flex-1 py-3 border border-white/10 rounded-xl hover:bg-white/5 transition font-bold text-sm">Google</button>
                <button class="flex-1 py-3 border border-white/10 rounded-xl hover:bg-white/5 transition font-bold text-sm">eSewa</button>
            </div>
        </div>
        
        <p class="text-center mt-8 text-sm text-gray-500">
            Need help? <a href="#" class="text-orange-500 font-bold">Contact Mrtechnician Support</a>
        </p>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            alert("Login Successful! Redirecting to the Tournament Dashboard...");
            // In a real scenario, use: window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
